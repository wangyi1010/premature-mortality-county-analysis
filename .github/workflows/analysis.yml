name: analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      # Install binary packages from Posit Package Manager (fast, no source
      # compilation on Ubuntu). Versions are additionally pinned in renv.lock
      # for local reproducibility via `renv::restore()`.
      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rmarkdown
            any::testthat

      - name: Run tests
        run: Rscript tests/testthat.R

      - name: Run analysis pipeline
        run: Rscript scripts/run_analysis.R

      - name: Install TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Render report
        run: Rscript -e 'rmarkdown::render("report.Rmd")'

      - name: Upload rendered outputs
        uses: actions/upload-artifact@v7
        with:
          name: report-and-figures
          path: |
            report.pdf
            outputs/
